# ============================================================
#  BasicDeathChest — messages.yml
#  All messages use MiniMessage format.
#  Available global placeholders: %player%
# ============================================================

prefix: "<dark_gray>[<gold>DeathChest</gold>]</dark_gray> "

# ─── General ─────────────────────────────────────────────────
no-permission: "<red>You don't have permission to do that."
player-only: "<red>This command can only be run by a player."
unknown-command: "<red>Unknown subcommand. Use <yellow>/deathchest help<red>."

# ─── Death Chest Spawned ─────────────────────────────────────
chest-spawned: "<green>Your death chest has been created at <white>%x%<green>, <white>%y%<green>, <white>%z%<green>. <click:run_command:/death><yellow>Click here</yellow></click> or run <yellow>/death</yellow> to see/teleport your death loc."
chest-spawned-no-space: "<yellow>Warning: Some items could not fit in a chest and were dropped."
chest-permission-required: "<red>You do not have permission to generate a death chest."

# ─── Chest Interaction ───────────────────────────────────────
chest-not-owner: "<red>This death chest belongs to someone else."
chest-opened-by-owner: "<green>Opening your death chest..."
chest-emptied: "<green>Your death chest was emptied and has been removed."
chest-expired: "<yellow>Your death chest at <white>%x%<yellow>, <white>%y%<yellow>, <white>%z%<yellow> has expired and the contents were dropped."

# ─── GUI ─────────────────────────────────────────────────────
gui-no-entries: "<yellow>You have no recorded death locations yet."
gui-no-entries-lore:
  - "<gray>Go explore the world!"
  - "<gray>Your deaths will be saved here."
gui-entry-name: "<red>☠ <white>Death #%index%"
gui-entry-lore-world: "<gray>World: <white>%world%"
gui-entry-lore-cause: "<gray>Cause: <red>%cause%"
gui-entry-lore-coords: "<gray>Location: <white>%x%<gray>, <white>%y%<gray>, <white>%z%"
gui-entry-lore-time: "<gray>Time: <white>%time%"
gui-entry-lore-click: "<yellow>Click to teleport!"

# ─── Pagination Buttons ──────────────────────────────────────
gui-previous-page: "<yellow>« Previous Page"
gui-next-page: "Next Page »"
gui-page-indicator-name: "<gold>Page %current% of %total%"
gui-page-indicator-lore:
  - "<gray>Total Records: <white>%total_records%"
  - "<gray>Showing: <white>%start% - %end%"
gui-page-indicator-lore-empty:
  - "<gray>Total Records: <white>0"
  - "<gray>Showing: <white>0"

# ─── Teleportation ───────────────────────────────────────────
teleport-disabled: "<red>Teleportation to death locations is disabled."
teleport-no-permission: "<red>You don't have permission to teleport."
teleport-success: "<green>Teleporting to your death location..."
teleport-cost: "<yellow>Teleporting cost you <gold>%cost% coins<yellow>."
teleport-insufficient-funds: "<red>You need <gold>%cost% coins<red> to teleport. You have <gold>%balance%<red>."
teleport-free-remaining: "<green>Free teleport used. <yellow>%remaining% free teleports remaining."
teleport-world-not-loaded: "<red>That world is no longer loaded."

# ─── Bodyguards ──────────────────────────────────────────────
bodyguards-spawned: "<green>Two iron golem bodyguards have been summoned to protect you!"
bodyguards-despawned: "<yellow>Your bodyguard escort has departed."

# ─── Reload ──────────────────────────────────────────────────
reload-success: "<green>BasicDeathChest configuration reloaded successfully."
reload-fail: "<red>An error occurred during reload. Check console for details."

# ─── Hologram Timer Format ───────────────────────────────────
# Used when the %timer% placeholder is rendered in hologram lines.
timer-format-infinite: "<green>∞ Never"
timer-format-seconds: "<yellow>%s%s"  # %s% = remaining seconds
timer-format-minutes: "<yellow>%m%m %s%s"

# ─── Admin ───────────────────────────────────────────────────
admin-chest-removed: "<green>Death chest at %location% removed."
admin-reload-start: "<gray>Reloading BasicDeathChest..."

# ─── Help Messages ───────────────────────────────────────────
help-header: "<gold><bold>BasicDeathChest</bold></gold> <gray>v%version%"
help-gui: "<yellow>/%cmd% gui</yellow> <gray>— Open your death locations history."
help-admin-gui: "<yellow>/%cmd% gui [player]</yellow> <gray>— Open another player's death history (admin)."
help-reload: "<yellow>/%cmd% reload</yellow> <gray>— Reload configuration (admin)."
help-info: "<yellow>/%cmd% info</yellow> <gray>— Show this help message."

# ─── Death Reasons ───────────────────────────────────────────
death-reasons:
  CONTACT: "Contact"
  ENTITY_ATTACK: "Entity Attack"
  PROJECTILE: "Projectile"
  SUFFOCATION: "Suffocation"
  FALL: "Fall Damage"
  FIRE: "Fire"
  FIRE_TICK: "Burning"
  MELTING: "Melting"
  LAVA: "Lava"
  DROWNING: "Drowning"
  BLOCK_EXPLOSION: "Explosion"
  ENTITY_EXPLOSION: "Entity Explosion"
  VOID: "Void"
  LIGHTNING: "Lightning"
  SUICIDE: "Suicide"
  STARVATION: "Starvation"
  POISON: "Poison"
  WITHER: "Wither Effect"
  FALLING_BLOCK: "Falling Block"
  THORNS: "Thorns"
  DRAGON_BREATH: "Dragon Breath"
  CUSTOM: "Custom"
  FLY_INTO_WALL: "Kinetic Energy"
  HOT_FLOOR: "Magma"
  CRAMMING: "Cramming"
  DRYOUT: "Dryout"
  FREEZE: "Freezing"
  SONIC_BOOM: "Sonic Boom"
  UNKNOWN: "Unknown"
